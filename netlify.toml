[build]
  command = "pnpm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# Proxy API requests to the backend (Railway).
# Set PUBLIC_API_URL as a Netlify env var to your Railway domain.
[[redirects]]
  from = "/graphql"
  to = "https://innoserve-web-api-production.up.railway.app/graphql"
  status = 200
  force = true

[[redirects]]
  from = "/upload"
  to = "https://innoserve-web-api-production.up.railway.app/upload"
  status = 200
  force = true

[[redirects]]
  from = "/file/*"
  to = "https://innoserve-web-api-production.up.railway.app/file/:splat"
  status = 200
  force = true
